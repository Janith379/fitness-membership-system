spring.application.name=fitzone-gym

# Server configuration
server.port=8080

# Data file paths (relative to project working directory)
fitzone.data.members-file=src/main/resources/data/members.txt
fitzone.data.payments-file=src/main/resources/data/payments.txt
fitzone.data.trainers-file=src/main/resources/data/trainers.txt
fitzone.data.membership-plans-file=src/main/resources/data/membership_plans.txt
fitzone.data.workout-schedules-file=src/main/resources/data/workout_schedules.txt
fitzone.data.diet-plans-file=src/main/resources/data/diet_plans.txt
fitzone.data.bmr-file=src/main/resources/data/bmr_data.txt
fitzone.data.ai-plans-dir=src/main/resources/data/ai_plans

# Thymeleaf settings
spring.thymeleaf.cache=false

# Logging
logging.level.com.fitzone=DEBUG
logging.level.org.springframework.security=WARN