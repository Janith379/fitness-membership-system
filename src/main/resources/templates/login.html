<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 10, 12, 0.8), rgba(10, 10, 12, 0.9)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop') center/cover no-repeat;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 0.8rem 1rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ffcc;
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 204, 0.25);
            color: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #00ffcc 0%, #00b3ff 100%);
            color: #0a0a0c;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <a th:href="@{/}" class="text-decoration-none">
                <h2 class="mb-0">
                    <span style="color: white; font-family: 'Outfit', sans-serif; font-weight: 700;">Fit</span><span style="color: #00ffcc; font-family: 'Outfit', sans-serif; font-weight: 700;">Zone</span>
                </h2>
            </a>
            <p class="text-muted mt-2">Enter your credentials to continue</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label text-light">Username / Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control border-secondary" id="username" name="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-light">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-secondary text-muted"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-secondary" id="password" name="password" required>
                </div>
                <div class="form-text text-muted mt-2 small">
                    * Members: Use your email as username and phone number as password.
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                Sign In <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
