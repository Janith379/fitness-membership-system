<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Trainer Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
    <style>
        .upload-box {
            border: 2px dashed rgba(255, 45, 45, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-box:hover, .upload-box.dragover {
            border-color: var(--primary);
            background: rgba(255, 45, 45, 0.05);
        }

        .preview-container {
            margin-top: 15px;
            position: relative;
            display: none;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--glass-border);
        }

        .remove-img {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-dark">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg scrolled fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">FIT<span>ZONE</span> GYM</a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members/list}">MEMBERS</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/trainers/list}">TRAINERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plans/list}">PLANS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workouts/list}">WORKOUTS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/diets/list}">DIETS</a></li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm border-2 fw-bold">LOGOUT</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card">
                <h3 class="bold-text text-primary mb-4" th:text="${trainer.trainerId == null ? 'ADD TRAINER' : 'EDIT TRAINER'}">TRAINER FORM</h3>
                
                <div th:if="${error}" class="alert alert-danger rounded-0 border-0 mb-4 py-2 small fw-bold" style="background: rgba(220, 53, 69, 0.1); color: #ff6b6b;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${error}">Error message</span>
                </div>

                <form th:action="${trainer.trainerId == null ? '/trainers/add' : '/trainers/edit/' + trainer.trainerId}" th:object="${trainer}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Full Name</label>
                        <input type="text" class="form-control" th:field="*{fullName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Specialization</label>
                        <select class="form-select" th:field="*{specialization}" required>
                            <option value="" disabled selected>Select Specialization</option>
                            <option value="Fitness Trainer">Fitness Trainer</option>
                            <option value="Personal Trainer">Personal Trainer</option>
                            <option value="Strength Training">Strength Training</option>
                            <option value="Bodybuilding">Bodybuilding</option>
                            <option value="Weight Loss">Weight Loss</option>
                            <option value="Yoga">Yoga</option>
                            <option value="Cardio Training">Cardio Training</option>
                            <option value="Zumba">Zumba</option>
                            <option value="CrossFit">CrossFit</option>
                            <option value="Nutrition Coach">Nutrition Coach</option>
                            <option value="Rehabilitation Trainer">Rehabilitation Trainer</option>
                            <option value="Senior Fitness Trainer">Senior Fitness Trainer</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Phone</label>
                        <input type="text" class="form-control" th:field="*{phone}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Trainer Photo</label>
                        
                        <!-- Hidden input for existing image path -->
                        <input type="hidden" th:field="*{imageUrl}" id="existingImageUrl">
                        
                        <div id="dropZone" class="upload-box">
                            <i class="bi bi-cloud-arrow-up text-primary display-4 mb-2"></i>
                            <p class="mb-1 text-white fw-bold">Drag & drop trainer photo here</p>
                            <p class="text-gray small mb-2">or click to upload</p>
                            <p id="fileNameDisplay" class="text-primary small fw-bold mb-0"></p>
                            <input type="file" id="imageFile" name="imageFile" class="d-none" accept="image/png, image/jpeg, image/jpg, image/webp">
                        </div>

                        <div id="previewContainer" class="preview-container">
                            <img id="imagePreview" src="#" alt="Preview" class="preview-img">
                            <div id="removeImg" class="remove-img"><i class="bi bi-x"></i></div>
                        </div>
                        
                        <div class="form-text text-gray small mt-1">Accepted: JPG, PNG, WEBP.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Availability Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="Available">Available</option>
                            <option value="Busy">Busy</option>
                            <option value="On Leave">On Leave</option>
                        </select>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn-main flex-grow-1">SAVE</button>
                        <a th:href="@{/trainers/list}" class="btn btn-outline-light rounded-0 px-4">CANCEL</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('imageFile');
    const previewContainer = document.getElementById('previewContainer');
    const previewImg = document.getElementById('imagePreview');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const removeBtn = document.getElementById('removeImg');
    const existingImageUrl = document.getElementById('existingImageUrl').value;

    // Show existing image if editing
    if (existingImageUrl && existingImageUrl.trim() !== "") {
        // Resolve path for display
        let displayPath = existingImageUrl;
        if (!displayPath.startsWith('http') && !displayPath.startsWith('/')) {
            displayPath = '/' + displayPath;
        }
        previewImg.src = displayPath;
        previewContainer.style.display = 'block';
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            handleFiles(fileInput.files[0]);
        }
    });

    function handleFiles(file) {
        if (file.type.match('image.*')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewContainer.style.display = 'block';
                fileNameDisplay.textContent = file.name;
            };
            reader.readAsDataURL(file);
        } else {
            alert("Please upload an image file (JPG, PNG, WEBP)");
        }
    }

    removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.value = '';
        fileNameDisplay.textContent = '';
        previewContainer.style.display = 'none';
        previewImg.src = '#';
        // Note: We keep existingImageUrl in the hidden input unless we want to delete it from server
    });
</script>
</body>
</html>
