<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Diet Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
</head>
<body class="bg-dark">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg scrolled fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">FIT<span>ZONE</span> GYM</a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members/list}">MEMBERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/trainers/list}">TRAINERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plans/list}">PLANS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workouts/list}">WORKOUTS</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/diets/list}">DIETS</a></li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm border-2 fw-bold">LOGOUT</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card">
                <h3 class="bold-text text-primary mb-4" th:text="${diet.dietId == null ? 'ASSIGN DIET' : 'EDIT DIET'}">DIET FORM</h3>
                <form th:action="${diet.dietId == null ? '/diets/add' : '/diets/edit/' + diet.dietId}" th:object="${diet}" method="post">
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Member</label>
                        <select class="form-select" th:field="*{memberId}" required>
                            <option value="">Select Member...</option>
                            <option th:each="m : ${members}" th:value="${m.memberId}" th:text="${m.fullName} + ' (' + ${m.memberId} + ')'"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Meal Type</label>
                        <input type="text" class="form-control" th:field="*{mealType}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Food Items</label>
                        <textarea class="form-control" th:field="*{foodItems}" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Calories</label>
                        <input type="number" class="form-control" th:field="*{calories}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray text-uppercase small fw-bold">Diet Image Path</label>
                        <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="main\resources\static\images\diet_1.jpg">
                        <div class="form-text text-gray small mt-1">Enter the path with extension (e.g. .jpg, .png).</div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn-main flex-grow-1">SAVE</button>
                        <a th:href="@{/diets/list}" class="btn btn-outline-light rounded-0 px-4">CANCEL</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
