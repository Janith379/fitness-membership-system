<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register new member - FitZone Gym">
    <title>Register Member - FitZone Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-fit">Fit</span><span class="brand-zone">Zone</span>
            <small class="text-muted ms-2" style="font-size: 0.7rem; font-weight: 400;">GYM</small>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/members/register}"><i class="bi bi-person-plus me-1"></i>Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/members/list}"><i class="bi bi-grid-3x3-gap me-1"></i>Dashboard</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Header -->
<div class="page-header" style="padding-top: 100px;">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/members/list}">Dashboard</a></li>
                <li class="breadcrumb-item active">Register Member</li>
            </ol>
        </nav>
        <h1>
            <i class="bi bi-person-plus-fill text-gradient me-2"></i>Register Member
        </h1>
        <p class="text-muted mt-2 mb-0">Add a new member to the gym and set up their membership plan.</p>
    </div>
</div>

<!-- Register Form -->
<div class="container mb-5">
    <div class="form-section fade-in-up">

        <div class="card-custom">
            <div class="card-body p-4">
                <form id="registrationForm" th:action="@{/members/register}" th:object="${registrationForm}" method="post" novalidate>

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                               placeholder="Enter full name">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                               placeholder="your.email@example.com">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <!-- Phone & Age Row -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="phone" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                   placeholder="0771234567">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="age" th:field="*{age}"
                                   th:classappend="${#fields.hasErrors('age')} ? 'is-invalid' : ''"
                                   min="16" max="100" placeholder="25">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{gender}" value="Male" id="genderMale">
                                <label class="form-check-label" for="genderMale" style="color: var(--text-secondary);">Male</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{gender}" value="Female" id="genderFemale">
                                <label class="form-check-label" for="genderFemale" style="color: var(--text-secondary);">Female</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" th:field="*{gender}" value="Other" id="genderOther">
                                <label class="form-check-label" for="genderOther" style="color: var(--text-secondary);">Other</label>
                            </div>
                        </div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                    </div>

                    <!-- Membership Type & Duration Row -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="membershipType" class="form-label">Membership Type</label>
                            <select class="form-select" id="membershipType" th:field="*{membershipType}"
                                    th:classappend="${#fields.hasErrors('membershipType')} ? 'is-invalid' : ''">
                                <option value="">Select type...</option>
                                <option th:each="plan : ${plans}" 
                                        th:value="${plan.planName}" 
                                        th:data-gender="${plan.targetGender}"
                                        th:text="${plan.planName} + ' — LKR ' + ${plan.monthlyFee} + '/month'"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('membershipType')}" th:errors="*{membershipType}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="durationMonths" class="form-label">Duration</label>
                            <select class="form-select" id="durationMonths" th:field="*{durationMonths}"
                                    th:classappend="${#fields.hasErrors('durationMonths')} ? 'is-invalid' : ''">
                                <option value="">Select duration...</option>
                                <option value="1">1 Month</option>
                                <option value="3">3 Months</option>
                                <option value="6">6 Months</option>
                                <option value="12">12 Months</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('durationMonths')}" th:errors="*{durationMonths}"></div>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="mb-4">
                        <label for="notes" class="form-label">Notes <span class="text-muted">(optional)</span></label>
                        <textarea class="form-control" id="notes" th:field="*{notes}" rows="3"
                                  placeholder="Any special requests or notes..."></textarea>
                    </div>

                    <!-- Submit -->
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary-custom flex-grow-1">
                            <i class="bi bi-credit-card me-2"></i>Proceed to Payment
                        </button>
                        <a th:href="@{/members/list}" class="btn-outline-custom">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="mb-0">
            <span class="brand-fit" style="font-family: 'Outfit', sans-serif; font-weight: 700;">Fit</span><span style="font-family: 'Outfit', sans-serif; font-weight: 700;">Zone</span>
            Gym &copy; 2026 — Membership Management System
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const genderRadios = document.querySelectorAll('input[name="gender"]');
        const planSelect = document.getElementById('membershipType');
        const allOptions = Array.from(planSelect.options);

        function filterPlans() {
            const selectedGender = document.querySelector('input[name="gender"]:checked')?.value;
            if (!selectedGender) return;

            // Clear current selection if it becomes invalid
            const currentVal = planSelect.value;
            
            // Show/Hide options based on gender
            planSelect.innerHTML = '';
            allOptions.forEach(opt => {
                const targetGender = opt.getAttribute('data-gender');
                if (!targetGender || targetGender === 'Any' || targetGender === selectedGender) {
                    planSelect.appendChild(opt);
                }
            });

            // Restore selection if still available
            planSelect.value = currentVal;
        }

        genderRadios.forEach(radio => radio.addEventListener('change', filterPlans));
        
        // Initial filter if gender is pre-selected (e.g. validation error return)
        filterPlans();
    });
</script>
</body>
</html>
