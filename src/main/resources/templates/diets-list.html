<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Diet Plans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
</head>
<body class="bg-dark">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg scrolled fixed-top">
    <div class="container-fluid px-lg-5">
        <a class="navbar-brand" th:href="@{/}">FIT<span>ZONE</span> GYM</a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members/list}">MEMBERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/trainers/list}">TRAINERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plans/list}">PLANS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workouts/list}">WORKOUTS</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/diets/list}">DIETS</a></li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm border-2 fw-bold">LOGOUT</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="section-title text-center mb-5" data-aos="fade-up">
        <h2 class="text-white">DIET <span>PLANS</span></h2>
        <div class="red-line mx-auto" style="width: 60px;"></div>
    </div>

    <div class="mb-4 text-end" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin/bmr}" class="btn btn-outline-primary rounded-0 px-4 fw-bold me-2"><i class="bi bi-calculator"></i> BMR CALCULATOR & REPORTS</a>
        <a th:href="@{/diets/add}" class="btn btn-danger rounded-0 px-4 fw-bold">ASSIGN NEW DIET</a>
    </div>

    <div class="glass-card" th:if="${!#lists.isEmpty(diets)}" data-aos="fade-up">
        <div class="table-responsive">
            <table class="payment-history text-white">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>MEMBER</th>
                    <th>MEAL TYPE</th>
                    <th>FOOD ITEMS</th>
                    <th>CALORIES</th>
                    <th sec:authorize="hasRole('ADMIN')">ACTIONS</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="diet : ${diets}">
                    <td th:text="${diet.dietId}" class="text-primary fw-bold">D001</td>
                    <td th:text="${diet.memberId}">M001</td>
                    <td th:text="${diet.mealType}">Breakfast</td>
                    <td th:text="${diet.foodItems}">Oats</td>
                    <td><span class="badge bg-danger rounded-0" th:text="${diet.calories} + ' kcal'">300 kcal</span></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="d-flex gap-2">
                            <a th:href="@{/diets/edit/{id}(id=${diet.dietId})}" class="btn btn-sm btn-outline-light rounded-0">EDIT</a>
                            <a th:href="@{/diets/delete/{id}(id=${diet.dietId})}" class="btn btn-sm btn-outline-danger rounded-0" onclick="return confirm('Delete diet plan?');">DELETE</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(diets)}" class="text-center py-5 glass-card" data-aos="zoom-in">
        <i class="bi bi-egg-fried text-gray display-1 mb-4"></i>
        <h3 class="bold-text text-white">NO DIET PLANS FOUND</h3>
        <p class="text-gray">No diet plans have been assigned yet.</p>
        <a th:href="@{/diets/add}" class="btn-main mt-3 px-5" sec:authorize="hasRole('ADMIN')">ASSIGN DIET</a>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
</script>
</body>
</html>
