<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | My BMR Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
    <style>
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .result-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }
        .result-val {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0;
        }
        .dashboard-bg {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('/images/my_dashboard.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-dark dashboard-bg">

<!-- Navbar -->
<nav class="navbar scrolled fixed-top">
    <div class="container-fluid px-lg-5">
        <a class="navbar-brand" th:href="@{/}">FIT<span>ZONE</span> GYM</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3 d-none d-md-inline" th:text="${member.fullName}">Member Name</span>
            <a th:href="@{/dashboard}" class="nav-link me-3 fw-bold">DASHBOARD</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm border-2 fw-bold">LOGOUT</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="d-flex justify-content-between align-items-center mb-5" data-aos="fade-down">
        <div>
            <h2 class="text-white bold-text m-0">MY <span>BMR</span></h2>
            <p class="text-gray m-0">Personal Calorie Target Calculator</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/ai-diet/generate}" class="btn btn-primary rounded-0 fw-bold"><i class="bi bi-magic"></i> AI DIET PLAN</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light rounded-0 fw-bold">BACK TO DASHBOARD</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success bg-success text-white border-0 rounded-0" role="alert" th:text="${successMessage}"></div>

    <div class="row g-4">
        <!-- Input Form -->
        <div class="col-lg-5" data-aos="fade-right">
            <div class="glass-card h-100">
                <h4 class="text-primary bold-text mb-4">CALCULATOR</h4>
                
                <form th:action="@{/member/bmr/save}" method="post">
                    <input type="hidden" name="memberId" th:value="${member.memberId}">
                    
                    <!-- Hidden inputs for calculated fields to be saved -->
                    <input type="hidden" id="hiddenBmr" name="bmr" th:value="${bmr.bmr}">
                    <input type="hidden" id="hiddenMaintenance" name="maintenanceCalories" th:value="${bmr.maintenanceCalories}">
                    <input type="hidden" id="hiddenWeightLoss" name="weightLossCalories" th:value="${bmr.weightLossCalories}">
                    <input type="hidden" id="hiddenWeightGain" name="weightGainCalories" th:value="${bmr.weightGainCalories}">
                    <input type="hidden" id="hiddenProtein" name="proteinTarget" th:value="${bmr.proteinTarget}">
                    <input type="hidden" id="hiddenWater" name="waterTarget" th:value="${bmr.waterTarget}">

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label text-gray small fw-bold">AGE</label>
                            <input type="number" id="age" class="form-control bg-dark text-white border-secondary" th:value="${member.age}" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-gray small fw-bold">GENDER</label>
                            <input type="text" id="gender" class="form-control bg-dark text-white border-secondary" th:value="${member.gender}" readonly>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-gray small fw-bold">HEIGHT (CM)</label>
                            <input type="number" step="0.1" id="height" name="height" class="form-control bg-dark text-white border-secondary" th:value="${bmr.height > 0 ? bmr.height : ''}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-gray small fw-bold">WEIGHT (KG)</label>
                            <input type="number" step="0.1" id="weight" name="weight" class="form-control bg-dark text-white border-secondary" th:value="${bmr.weight > 0 ? bmr.weight : ''}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-gray small fw-bold">ACTIVITY LEVEL</label>
                            <select id="activityLevel" name="activityLevel" class="form-select bg-dark text-white border-secondary" required>
                                <option value="Sedentary" th:selected="${bmr.activityLevel == 'Sedentary'}">Sedentary (Little to no exercise)</option>
                                <option value="Lightly Active" th:selected="${bmr.activityLevel == 'Lightly Active'}">Lightly Active (1-3 days/week)</option>
                                <option value="Moderately Active" th:selected="${bmr.activityLevel == 'Moderately Active'}">Moderately Active (3-5 days/week)</option>
                                <option value="Very Active" th:selected="${bmr.activityLevel == 'Very Active'}">Very Active (6-7 days/week)</option>
                                <option value="Extra Active" th:selected="${bmr.activityLevel == 'Extra Active'}">Extra Active (Very hard exercise/job)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-gray small fw-bold">FITNESS GOAL</label>
                            <select id="fitnessGoal" name="fitnessGoal" class="form-select bg-dark text-white border-secondary" required>
                                <option value="Weight Loss" th:selected="${bmr.fitnessGoal == 'Weight Loss'}">Weight Loss</option>
                                <option value="Maintain Weight" th:selected="${bmr.fitnessGoal == 'Maintain Weight'}">Maintain Weight</option>
                                <option value="Weight Gain" th:selected="${bmr.fitnessGoal == 'Weight Gain'}">Weight Gain</option>
                                <option value="Muscle Gain" th:selected="${bmr.fitnessGoal == 'Muscle Gain'}">Muscle Gain</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-danger w-100 rounded-0 mt-4 py-2 fw-bold">SAVE BMR PROFILE</button>
                </form>
            </div>
        </div>

        <!-- Output Cards -->
        <div class="col-lg-7" data-aos="fade-left" data-aos-delay="100">
            <div class="glass-card h-100">
                <h4 class="text-white bold-text mb-4">YOUR CALORIE TARGETS</h4>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="result-card">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-fire text-primary"></i> BASAL METABOLIC RATE</p>
                            <p class="result-val" id="bmrOutput" th:text="${bmr.bmr > 0 ? bmr.bmr + ' kcal' : '0 kcal'}">0 kcal</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="result-card" style="border-left-color: #ff9800;">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-activity text-warning"></i> MAINTENANCE</p>
                            <p class="result-val" id="maintenanceOutput" th:text="${bmr.maintenanceCalories > 0 ? bmr.maintenanceCalories + ' kcal' : '0 kcal'}">0 kcal</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="result-card" style="border-left-color: #00ff88;">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-arrow-down-circle text-success"></i> WEIGHT LOSS</p>
                            <p class="result-val text-success" id="weightLossOutput" th:text="${bmr.weightLossCalories > 0 ? bmr.weightLossCalories + ' kcal' : '0 kcal'}">0 kcal</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="result-card" style="border-left-color: #f44336;">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-arrow-up-circle text-danger"></i> WEIGHT/MUSCLE GAIN</p>
                            <p class="result-val text-danger" id="weightGainOutput" th:text="${bmr.weightGainCalories > 0 ? bmr.weightGainCalories + ' kcal' : '0 kcal'}">0 kcal</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="result-card" style="border-left-color: #9c27b0;">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-egg text-purple"></i> PROTEIN INTAKE</p>
                            <p class="result-val" id="proteinOutput" th:text="${bmr.proteinTarget > 0 ? bmr.proteinTarget + 'g' : '0g'}">0g</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="result-card" style="border-left-color: #03a9f4;">
                            <p class="text-gray small text-uppercase fw-bold mb-1"><i class="bi bi-droplet text-info"></i> WATER INTAKE</p>
                            <p class="result-val" id="waterOutput" th:text="${bmr.waterTarget > 0 ? bmr.waterTarget + 'L' : '0L'}">0L</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>
<script th:src="@{/js/bmr-calculator.js}"></script>
</body>
</html>
