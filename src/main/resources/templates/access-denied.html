<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="text-center fade-in-up">
    <i class="bi bi-shield-lock text-danger" style="font-size: 6rem; opacity: 0.8;"></i>
    <h1 class="display-4 fw-bold mt-3 mb-2 text-white">Access Denied</h1>
    <p class="text-muted fs-5 mb-4">You do not have permission to view this page.</p>
    
    <div class="d-flex gap-3 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
            <i class="bi bi-arrow-left me-2"></i> Go Back
        </a>
        <a th:href="@{/}" class="btn btn-primary px-4" style="background: linear-gradient(135deg, #00ffcc 0%, #00b3ff 100%); color: #0a0a0c; border: none; font-weight: 600;">
            <i class="bi bi-house me-2"></i> Home
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
