<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainers Dashboard - FitZone Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-fit">Fit</span><span class="brand-zone">Zone</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members/list}"><i class="bi bi-people me-1"></i>Members</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/trainers/list}"><i class="bi bi-person-badge me-1"></i>Trainers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plans/list}"><i class="bi bi-card-checklist me-1"></i>Plans</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workouts/list}"><i class="bi bi-activity me-1"></i>Workouts</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/diets/list}"><i class="bi bi-egg-fried me-1"></i>Diets</a></li>
                <li class="nav-item ms-lg-2" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Header -->
<div class="page-header" style="padding-top: 100px;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h1><i class="bi bi-person-badge text-gradient me-2"></i>Trainers Management</h1>
                <p class="text-muted mt-2 mb-0">Manage gym trainers</p>
            </div>
            <a th:href="@{/trainers/add}" class="btn-primary-custom">
                <i class="bi bi-plus-circle me-2"></i>Add Trainer
            </a>
        </div>
    </div>
</div>

<!-- Main Content -->
<div class="container mb-5 mt-4">
    <div class="card-custom reveal" th:if="${!#lists.isEmpty(trainers)}">
        <div class="table-responsive">
            <table class="table table-custom mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="trainer : ${trainers}">
                    <td><span class="fw-bold" style="color: #000000;" th:text="${trainer.trainerId}">T001</span></td>
                    <td th:text="${trainer.fullName}">Name</td>
                    <td th:text="${trainer.specialization}">Specialization</td>
                    <td th:text="${trainer.phone}">Phone</td>
                    <td th:text="${trainer.email}">Email</td>
                    <td>
                        <div class="d-flex gap-1 flex-nowrap">
                            <a th:href="@{/trainers/edit/{id}(id=${trainer.trainerId})}" class="action-btn action-btn-edit"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/trainers/delete/{id}(id=${trainer.trainerId})}" class="action-btn action-btn-delete" onclick="return confirm('Delete trainer?');"><i class="bi bi-trash"></i></a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(trainers)}" class="empty-state reveal">
        <div class="empty-icon"><i class="bi bi-person-badge"></i></div>
        <h3>No Trainers Found</h3>
        <a th:href="@{/trainers/add}" class="btn-primary-custom mt-3"><i class="bi bi-plus-circle me-2"></i>Add Trainer</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
