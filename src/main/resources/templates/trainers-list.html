<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Expert Trainers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
    <style>
        .trainer-management-bg {
            background: 
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url('/images/trainer_bg.png') no-repeat center center fixed !important;
            background-size: cover !important;
            min-height: 100vh;
        }
        .trainer-card {
            background: rgba(15, 15, 15, 0.7) !important;
            border: 1px solid rgba(255, 45, 45, 0.1) !important;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding: 12px 20px 12px 45px !important;
            border-radius: 50px !important;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(255, 45, 45, 0.2) !important;
        }

        .search-box {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 1.2rem;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 5;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 12px;
            font-weight: 800;
        }
    </style>
</head>
<body class="bg-dark trainer-management-bg">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg scrolled fixed-top">
    <div class="container-fluid px-lg-5">
        <a class="navbar-brand" th:href="@{/}">FIT<span>ZONE</span> GYM</a>
        <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">HOME</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/members/list}">MEMBERS</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/trainers/list}">TRAINERS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plans/list}">PLANS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workouts/list}">WORKOUTS</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/diets/list}">DIETS</a></li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm border-2 fw-bold">LOGOUT</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="section-title text-center mb-5" data-aos="fade-up">
        <h2 class="text-white">OUR EXPERT <span>TRAINERS</span></h2>
        <div class="red-line mx-auto" style="width: 60px;"></div>
    </div>

    <!-- Feature 1: Search and Filter -->
    <div class="search-container" data-aos="fade-up" data-aos-delay="100">
        <div class="search-box">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="trainerSearch" class="form-control search-input" placeholder="Search by name or specialization...">
        </div>
    </div>

    <div class="mb-4 text-end" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/trainers/add}" class="btn btn-danger rounded-0 px-4 fw-bold">ADD NEW TRAINER</a>
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(trainers)}">
        <div class="col-md-4 trainer-item" th:each="trainer : ${trainers}" data-aos="fade-up">
            <div class="trainer-card glass-card p-0">
                <!-- Feature 2: Availability Status -->
                <span th:class="${'badge rounded-pill status-badge ' + 
                    (trainer.status == 'Available' ? 'bg-success' : 
                     trainer.status == 'Busy' ? 'bg-danger' : 'bg-warning')}"
                    th:text="${trainer.status}">Available</span>

                <img th:src="@{${trainer.displayImageUrl}}"
                     class="trainer-img" th:alt="${trainer.fullName}">
                <div class="trainer-info">
                    <h4 th:text="${trainer.fullName}">Trainer Name</h4>
                    <p class="text-gray mb-1 specialization-text" th:text="${trainer.specialization}">Specialization</p>
                    <div class="mt-2 small">
                        <p class="mb-1 text-white"><i class="bi bi-telephone me-2 text-primary"></i><span th:text="${trainer.phone}">Phone</span></p>
                        <p class="mb-0 text-white"><i class="bi bi-envelope me-2 text-primary"></i><span th:text="${trainer.email}">Email</span></p>
                    </div>
                    
                    <div class="mt-3 d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/trainers/edit/{id}(id=${trainer.trainerId})}" class="btn btn-sm btn-outline-light rounded-0">EDIT</a>
                        <a th:href="@{/trainers/delete/{id}(id=${trainer.trainerId})}" class="btn btn-sm btn-outline-danger rounded-0" onclick="return confirm('Delete trainer?');">DELETE</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(trainers)}" class="text-center py-5 glass-card" data-aos="zoom-in">
        <i class="bi bi-person-badge text-gray display-1 mb-4"></i>
        <h3 class="bold-text text-white">NO TRAINERS FOUND</h3>
        <p class="text-gray">Our team is currently being assembled.</p>
        <a th:href="@{/trainers/add}" class="btn-main mt-3 px-5" sec:authorize="hasRole('ADMIN')">ADD TRAINER</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    // Feature 1: Client-side Search and Filter Logic
    document.getElementById('trainerSearch').addEventListener('input', function() {
        let filter = this.value.toLowerCase();
        let items = document.querySelectorAll('.trainer-item');
        let count = 0;

        items.forEach(item => {
            let name = item.querySelector('h4').textContent.toLowerCase();
            let spec = item.querySelector('.specialization-text').textContent.toLowerCase();
            
            if (name.includes(filter) || spec.includes(filter)) {
                item.style.display = "";
                count++;
            } else {
                item.style.display = "none";
            }
        });

        // Optional: show "No results" message if count is 0
        const noResults = document.getElementById('noResultsMsg');
        if (count === 0) {
            if (!noResults) {
                const msg = document.createElement('div');
                msg.id = 'noResultsMsg';
                msg.className = 'text-center py-5 w-100';
                msg.innerHTML = '<h4 class="text-gray">No trainers match your search</h4>';
                document.querySelector('.row.g-4').appendChild(msg);
            }
        } else if (noResults) {
            noResults.remove();
        }
    });
</script>
</body>
</html>
