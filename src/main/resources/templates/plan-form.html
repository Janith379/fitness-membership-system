<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Form - FitZone Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-fit">Fit</span><span class="brand-zone">Zone</span>
        </a>
    </div>
</nav>

<div class="page-header" style="padding-top: 100px;">
    <div class="container">
        <h1><i class="bi bi-card-checklist text-gradient me-2"></i>Plan Form</h1>
    </div>
</div>

<div class="container mb-5 mt-4">
    <div class="form-section fade-in-up">
        <div class="card-custom">
            <div class="card-body p-4">
                <form th:action="${plan.planId == null ? '/plans/add' : '/plans/edit/' + plan.planId}" th:object="${plan}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Plan Name</label>
                        <input type="text" class="form-control" th:field="*{planName}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Monthly Fee</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{monthlyFee}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Duration (Months)</label>
                        <input type="number" class="form-control" th:field="*{durationMonths}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Target Gender</label>
                        <select class="form-select" th:field="*{targetGender}" required>
                            <option value="Any">Any</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary-custom flex-grow-1"><i class="bi bi-save me-2"></i>Save</button>
                        <a th:href="@{/plans/list}" class="btn-outline-custom">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
