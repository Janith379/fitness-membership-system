<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Form - FitZone Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-fit">Fit</span><span class="brand-zone">Zone</span>
        </a>
    </div>
</nav>

<div class="page-header" style="padding-top: 100px;">
    <div class="container">
        <h1><i class="bi bi-activity text-gradient me-2"></i>Workout Schedule Form</h1>
    </div>
</div>

<div class="container mb-5 mt-4">
    <div class="form-section fade-in-up">
        <div class="card-custom">
            <div class="card-body p-4">
                <form th:action="${schedule.scheduleId == null ? '/workouts/add' : '/workouts/edit/' + schedule.scheduleId}" th:object="${schedule}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Member</label>
                        <select class="form-select" th:field="*{memberId}" required>
                            <option value="">Select Member...</option>
                            <option th:each="m : ${members}" th:value="${m.memberId}" th:text="${m.fullName} + ' (' + ${m.memberId} + ')'"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Trainer</label>
                        <select class="form-select" th:field="*{trainerId}" required>
                            <option value="">Select Trainer...</option>
                            <option th:each="t : ${trainers}" th:value="${t.trainerId}" th:text="${t.fullName} + ' (' + ${t.specialization} + ')'"></option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Day of Week</label>
                        <select class="form-select" th:field="*{dayOfWeek}" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Workout Details</label>
                        <textarea class="form-control" th:field="*{workoutDetails}" rows="3" required></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary-custom flex-grow-1"><i class="bi bi-save me-2"></i>Save</button>
                        <a th:href="@{/workouts/list}" class="btn-outline-custom">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
