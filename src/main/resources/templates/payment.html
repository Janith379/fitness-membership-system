<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitZone | Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link th:href="@{/css/premium.css}" rel="stylesheet">
</head>
<body class="bg-dark">

<!-- Navbar (Minimal for checkout) -->
<nav class="navbar navbar-expand-lg fixed-top scrolled" id="mainNav">
    <div class="container-fluid px-lg-5 d-flex justify-content-between align-items-center">
        <a class="navbar-brand" th:href="@{/}">
            FIT<span>ZONE</span> GYM<i class="bi bi-dumbbell nav-brand-icon"></i>
        </a>
        <a th:href="@{/}" class="nav-link fw-bold text-white text-uppercase" style="letter-spacing: 1px;">
            <i class="bi bi-house-door me-1 text-primary"></i> Back to Home
        </a>
    </div>
</nav>

<div class="container" style="margin-top: 120px; margin-bottom: 80px;">
    <div class="section-title text-center mb-5" data-aos="fade-up">
        <h2 class="text-white">SECURE <span>CHECKOUT</span></h2>
        <div class="red-line mx-auto" style="width: 60px;"></div>
    </div>

    <div class="row g-5">
        <!-- Order Summary -->
        <div class="col-lg-5" data-aos="fade-right">
            <div class="glass-card">
                <h4 class="bold-text text-primary mb-4"><i class="bi bi-receipt me-2"></i>ORDER SUMMARY</h4>
                
                <div class="d-flex justify-content-between py-3 border-bottom border-secondary">
                    <span class="text-gray">Member</span>
                    <span class="text-white fw-bold" th:text="${registrationForm.fullName}">John Doe</span>
                </div>
                <div class="d-flex justify-content-between py-3 border-bottom border-secondary">
                    <span class="text-gray">Membership</span>
                    <span class="badge bg-danger rounded-0" th:text="${registrationForm.membershipType}">Premium</span>
                </div>
                <div class="d-flex justify-content-between py-3 border-bottom border-secondary">
                    <span class="text-gray">Duration</span>
                    <span class="text-white" th:text="${registrationForm.durationMonths} + ' Month(s)'">6 Months</span>
                </div>
                <div class="d-flex justify-content-between py-3 border-bottom border-secondary" th:if="${discountPercentage > 0}">
                    <span class="text-gray">Discount (<span th:text="${discountPercentage}"></span>%)</span>
                    <span class="text-primary fw-bold" th:text="'- LKR ' + ${#numbers.formatDecimal(discountAmount, 1, 2)}">- LKR 3,000.00</span>
                </div>
                
                <div class="d-flex justify-content-between pt-4 mt-2">
                    <h3 class="bold-text text-white">TOTAL</h3>
                    <h3 class="bold-text text-primary" th:text="'LKR ' + ${#numbers.formatDecimal(totalAmount, 1, 2)}">LKR 27,000.00</h3>
                </div>

                <div class="mt-4 p-3 info-box-premium small">
                    <i class="bi bi-shield-lock-fill text-primary me-2"></i> Your payment is encrypted and secure.
                </div>
            </div>
        </div>

        <!-- Card Payment -->
        <div class="col-lg-7" data-aos="fade-left">
            <div class="glass-card">
                <h4 class="bold-text text-white mb-4"><i class="bi bi-credit-card-2-front me-2"></i>PAYMENT DETAILS</h4>
                
                <form id="paymentForm" th:action="@{/payment/process}" th:object="${paymentForm}" method="post" novalidate>
                    <div class="form-group mb-4">
                        <label class="small text-gray text-uppercase fw-bold mb-2">Cardholder Name</label>
                        <input type="text" class="form-control" th:field="*{cardholderName}" th:classappend="${#fields.hasErrors('cardholderName')} ? 'is-invalid' : ''" placeholder="Name on card">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('cardholderName')}" th:errors="*{cardholderName}" style="display:block;"></div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="small text-gray text-uppercase fw-bold mb-2">Card Type</label>
                        <div class="select-wrapper">
                            <select class="form-select" id="cardType">
                                <option value="" disabled selected>Select card type...</option>
                                <option value="visa">Visa</option>
                                <option value="master">Mastercard</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="small text-gray text-uppercase fw-bold mb-2">Card Number</label>
                        <input type="text" class="form-control" id="cardNumber" th:field="*{cardNumber}" th:classappend="${#fields.hasErrors('cardNumber')} ? 'is-invalid' : ''" placeholder="Enter 16-digit card number" maxlength="19">
                        <div class="card-error" id="cardError" style="display:none; color: #ff4d4d; font-size: 0.8rem; margin-top: 6px;"></div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('cardNumber')}" th:errors="*{cardNumber}" style="display:block;"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group mb-4">
                            <label class="small text-gray text-uppercase fw-bold mb-2">Expiry Date</label>
                            <input type="text" class="form-control" th:field="*{expiryDate}" th:classappend="${#fields.hasErrors('expiryDate')} ? 'is-invalid' : ''" placeholder="MM/YY">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('expiryDate')}" th:errors="*{expiryDate}" style="display:block;"></div>
                        </div>
                        <div class="col-md-6 form-group mb-4">
                            <label class="small text-gray text-uppercase fw-bold mb-2">CVV</label>
                            <input type="password" class="form-control" th:field="*{cvv}" th:classappend="${#fields.hasErrors('cvv')} ? 'is-invalid' : ''" placeholder="***">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cvv')}" th:errors="*{cvv}" style="display:block;"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn-main w-100 border-0 py-3 mt-2">COMPLETE PAYMENT</button>
                    
                    <div class="text-center mt-3">
                        <a th:href="@{/members/register}" class="text-gray text-decoration-none small"><i class="bi bi-chevron-left"></i> BACK TO REGISTRATION</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();

    document.addEventListener('DOMContentLoaded', function() {
        const cardType = document.getElementById('cardType');
        const cardNumber = document.getElementById('cardNumber');
        const cardError = document.getElementById('cardError');

        // Auto-detect card type from existing value
        if (cardNumber && cardNumber.value.length > 0) {
            const firstDigit = cardNumber.value.replace(/\s/g, '')[0];
            if (firstDigit === '4' && cardType) cardType.value = 'visa';
            else if (firstDigit === '5' && cardType) cardType.value = 'master';
        }

        // When card type is selected, set prefix
        if (cardType) {
            cardType.addEventListener('change', function() {
                if (!cardNumber) return;
                const raw = cardNumber.value.replace(/\s/g, '');
                if (this.value === 'visa' && (!raw || raw[0] !== '4')) {
                    cardNumber.value = '4';
                    cardNumber.focus();
                } else if (this.value === 'master' && (!raw || raw[0] !== '5')) {
                    cardNumber.value = '5';
                    cardNumber.focus();
                }
                validateCard();
            });
        }

        // Format card number with spaces and validate
        if (cardNumber) {
            cardNumber.addEventListener('input', function() {
                // Remove non-digits
                let raw = this.value.replace(/\D/g, '');
                
                // Limit to 16 digits
                if (raw.length > 16) raw = raw.substring(0, 16);
                
                // Format with spaces every 4 digits
                let formatted = '';
                for (let i = 0; i < raw.length; i++) {
                    if (i > 0 && i % 4 === 0) formatted += ' ';
                    formatted += raw[i];
                }
                this.value = formatted;

                // Auto-detect card type
                if (cardType && raw.length > 0) {
                    if (raw[0] === '4') cardType.value = 'visa';
                    else if (raw[0] === '5') cardType.value = 'master';
                }

                validateCard();
            });
        }

        function validateCard() {
            if (!cardNumber || !cardError) return;
            const raw = cardNumber.value.replace(/\s/g, '');
            
            if (raw.length === 0) {
                cardError.style.display = 'none';
                cardNumber.style.borderColor = '';
                return;
            }

            let errors = [];
            
            // Check card type prefix
            if (cardType && cardType.value === 'visa' && raw[0] !== '4') {
                errors.push('Visa cards must start with 4');
            } else if (cardType && cardType.value === 'master' && raw[0] !== '5') {
                errors.push('Mastercard cards must start with 5');
            } else if (raw[0] !== '4' && raw[0] !== '5') {
                errors.push('Card must start with 4 (Visa) or 5 (Mastercard)');
            }

            // Check length
            if (raw.length < 16) {
                errors.push('Must be 16 digits (' + raw.length + '/16)');
            }

            if (errors.length > 0) {
                cardError.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>' + errors.join(' • ');
                cardError.style.display = 'block';
                cardNumber.style.borderColor = '#ff4d4d';
            } else {
                const type = raw[0] === '4' ? 'Visa' : 'Mastercard';
                cardError.innerHTML = '<i class="bi bi-check-circle me-1" style="color:#2ecc71"></i><span style="color:#2ecc71">Valid ' + type + ' card number</span>';
                cardError.style.display = 'block';
                cardNumber.style.borderColor = '#2ecc71';
            }
        }

        // Block form submission if card is invalid
        const payForm = document.getElementById('paymentForm');
        if (payForm) {
            payForm.addEventListener('submit', function(e) {
                const raw = cardNumber ? cardNumber.value.replace(/\s/g, '') : '';
                let valid = true;

                if (!cardType || !cardType.value) {
                    if (cardError) {
                        cardError.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>Please select a card type';
                        cardError.style.display = 'block';
                    }
                    valid = false;
                }

                if (raw.length !== 16) {
                    if (cardError) {
                        cardError.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>Card number must be exactly 16 digits (' + raw.length + '/16)';
                        cardError.style.display = 'block';
                        if (cardNumber) cardNumber.style.borderColor = '#ff4d4d';
                    }
                    valid = false;
                } else if ((cardType && cardType.value === 'visa' && raw[0] !== '4') || 
                           (cardType && cardType.value === 'master' && raw[0] !== '5')) {
                    if (cardError) {
                        cardError.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>Card number does not match selected card type';
                        cardError.style.display = 'block';
                        if (cardNumber) cardNumber.style.borderColor = '#ff4d4d';
                    }
                    valid = false;
                }

                // Strip spaces from card number before submit
                if (cardNumber) {
                    cardNumber.value = raw;
                }

                if (!valid) {
                    e.preventDefault();
                }
            });
        }
    });
</script>
</body>
</html>
